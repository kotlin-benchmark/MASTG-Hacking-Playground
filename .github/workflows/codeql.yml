name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      languages:
        description: 'Languages to analyze'
        required: true
        default: 'java-kotlin'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 8 and 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            11


      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ github.event.inputs.languages || 'java-kotlin' }}
          build-mode: manual

      - name: Build Kotlin app (JDK 11)
        run: ./gradlew assembleDebug --no-daemon -Dkotlin.compiler.execution.strategy=in-process -Pkotlin.compiler.execution.strategy=in-process
        working-directory: Android/MASTG-Android-Kotlin-App

      - name: Build Java app (JDK 8)
        run: ./gradlew assembleDebug --no-daemon "-Dorg.gradle.java.home=$JAVA_HOME_8_X64"
        working-directory: Android/MSTG-Android-Java-App

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ github.event.inputs.languages || 'java-kotlin' }}"
