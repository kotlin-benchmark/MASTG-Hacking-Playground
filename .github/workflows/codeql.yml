name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '30 1 * * 0'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 8 and 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            11

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build Kotlin app (JDK 11)
        run: ./gradlew assembleDebug --no-daemon
        working-directory: Android/MASTG-Android-Kotlin-App

      - name: Build Java app (JDK 8)
        run: ./gradlew assembleDebug --no-daemon "-Dorg.gradle.java.home=$JAVA_HOME_8_X64"
        working-directory: Android/MSTG-Android-Java-App

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
